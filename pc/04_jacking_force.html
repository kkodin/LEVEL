<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>04 推進力予定グラフ</title>
<style>
:root{--blue:#0055a4;--bg:#f4f6f8;--line:#d8dee6;--text:#1f2937;--ok:#177245;--warn:#b45309;--ng:#b91c1c}
*{box-sizing:border-box}
body{font-family:Meiryo,"Yu Gothic",sans-serif;margin:0;background:var(--bg);color:var(--text);font-size:14px}
header{background:#003366;color:#fff;padding:12px 18px;display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
h1{font-size:20px;margin:0}
main{max-width:1240px;margin:18px auto;padding:0 14px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin:14px 0;box-shadow:0 2px 8px rgba(0,0,0,.05)}
h2{font-size:17px;border-left:6px solid var(--blue);padding-left:10px;margin:4px 0 14px}
h3{font-size:15px;margin:14px 0 8px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
button{border:0;border-radius:7px;padding:9px 14px;font-weight:bold;cursor:pointer;background:#2563eb;color:#fff}
button.secondary{background:#64748b}
button.ok{background:#17803d}
button.warn{background:#d97706}
input,button{font-family:inherit;font-size:14px}
.note{font-size:12px;color:#64748b;line-height:1.65}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.metric{border:1px solid #cbd5e1;border-radius:8px;padding:12px;background:#f8fafc}
.metric .label{font-size:12px;color:#64748b}
.metric .value{font-size:22px;font-weight:bold;margin-top:4px}
.pill{display:inline-block;border-radius:999px;padding:4px 9px;font-weight:bold}
.pill.ok{background:#dcfce7;color:#166534}
.pill.warn{background:#fef3c7;color:#92400e}
.pill.ng{background:#fee2e2;color:#991b1b}
table{border-collapse:collapse;width:100%;background:#fff;margin-top:10px}
th,td{border:1px solid #cfd7e3;padding:7px;text-align:center;vertical-align:middle}
th{background:#334155;color:#fff}
td.left,th.left{text-align:left}
.mono{font-family:Consolas,"Courier New",monospace}
.small{font-size:12px}
.tablewrap{overflow:auto}
canvas{width:100%;height:440px;border:1px solid #cbd5e1;background:#fff;border-radius:8px}
@media(max-width:760px){header{align-items:flex-start}.toolbar{width:100%}button{flex:1 1 42%}canvas{height:340px}th,td{font-size:12px;padding:5px}}
@media print{header,.no-print{display:none}.card{break-inside:avoid;box-shadow:none}}
</style>
</head>
<body>
<header>
  <h1>04 推進力予定グラフ・計算根拠</h1>
  <div class="toolbar">
    <input type="file" accept=".json" onchange="loadProjectFile(this)">
    <button onclick="run(getProject())">再計算</button>
    <button class="ok" onclick="exportSpreadsheet()">スプレッドシート出力</button>
    <button class="secondary" onclick="window.print()">印刷</button>
  </div>
</header>
<main>
  <div class="card">
    <h2>計算結果サマリー</h2>
    <div id="summary" class="grid"><p class="note">基線JSONを読み込んでください。</p></div>
  </div>

  <div class="card">
    <h2>推進力予定グラフ</h2>
    <canvas id="graph"></canvas>
    <p class="note">青線: 設計推進力予定、赤破線: 推進管耐荷力、薄橙: 曲線区間。1本ごとの予定値は下表に出力します。</p>
  </div>

  <div class="card">
    <h2>計算根拠・過程</h2>
    <div id="basis"></div>
  </div>

  <div class="card">
    <h2>曲線部の推力計算</h2>
    <div id="curveTable" class="tablewrap"></div>
  </div>

  <div class="card">
    <h2>1本ごとの推進力予定表</h2>
    <div id="scheduleTable" class="tablewrap"></div>
  </div>

  <div class="card">
    <h2>根拠ソース</h2>
    <div id="sources"></div>
  </div>
</main>

<script>
const SOURCE_NOTES=[
  ['刃口曲線推力検討002.xlsx','推進力算定1','F0 = 10×1.32×π×Bs×N。Excel定義名 F0 / _F0 = 推進力算定1!M25。'],
  ['刃口曲線推力検討002.xlsx','推進力算定2','τa = σ×μ′ + 付着力、fo = α×π×D×τa + w×μ′。Excel定義名 外周抵抗値 = 推進力算定2!M6。'],
  ['刃口曲線推力検討002.xlsx','推進力算定2/3','曲線係数 k = IF(φ<15°,tan15°,tan(φ/2))。K = 1/(cos α1 - k sin α1)、λ = (K^(n+1)-K)/(n(K-1))、曲線EC推力 = F_BC×K^n + λ×fo×CL。'],
  ['刃口施工計画_φ1350.pdf','p.3-4','工法、推進延長、曲線半径など施工計画条件。'],
  ['刃口施工計画_φ1350.pdf','p.17','蛇行が推進抵抗を増大させ、予定推進力を超える可能性がある旨の施工管理上の注意。']
];
const HUME_T={250:55,300:57,350:60,400:63,450:67,500:70,600:76,700:82,800:80,900:90,1000:100,1100:105,1200:115,1350:125,1500:140,1650:150,1800:160,2000:175,2200:190,2400:205,2600:220,2800:235,3000:250};
let P=null,G=null,CALC=null,PIPE_ROWS=[],CURVE_ROWS=[];

function fmt(x,d=3){return Number.isFinite(+x)?(+x).toFixed(d):''}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function dmsToDeg(d,m,s){return (+d||0)+(+m||0)/60+(+s||0)/3600}
function degToRad(d){return d*Math.PI/180}
function radToDeg(r){return ((r*180/Math.PI)%360+360)%360}
function safeName(s){return String(s||'現場').replace(/[\\/:*?"<>|\s]+/g,'_')}
function getProject(){try{return JSON.parse(localStorage.getItem('curvedJackingProject')||'null')}catch(e){return null}}
function loadProjectFile(input){
  const f=input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const obj=JSON.parse(r.result); localStorage.setItem('curvedJackingProject',JSON.stringify(obj)); run(obj)}catch(e){alert('JSON読込に失敗しました: '+e.message)}};
  r.readAsText(f,'utf-8'); input.value='';
}
function pipeDefaults(p){
  const size=+(p.pipe?.size||1350), inner=(p.pipe?.inner??size/1000);
  const t=p.pipe?.thickness??((HUME_T[size]||125)/1000);
  const outer=p.pipe?.outer??(inner+2*t);
  const centerR=p.pipe?.centerR??((inner+t)/2);
  const weight=p.pipe?.weight??13.9;
  const length=p.pipe?.length??1.2;
  const allowForce=p.pipe?.allowForce??0;
  return {...p.pipe, size, inner, thickness:t, outer, centerR, weight, length, allowForce};
}
function calcGeometry(p){
  const pts=[],curves=[],sections=[];
  let x=0,y=0,az=degToRad(p.alignment?.baseAz||0),accum=0,lineStart={name:'BP',x:0,y:0},lastPoint=lineStart,lastCurve=null;
  pts.push({name:'BP',x:0,y:0});
  (p.alignment?.curves||[]).forEach((cd,i)=>{
    const id=i+1,L=+cd.L||0,R=+cd.R||0,IA=degToRad(dmsToDeg(cd.deg,cd.min,cd.sec)),dir=cd.dir||'L';
    const TL=R*Math.tan(IA/2),CL=R*IA;
    const ip={name:`IP${id}`,x:x+L*Math.cos(az),y:y+L*Math.sin(az)};
    const bc={name:`BC${id}`,x:ip.x-TL*Math.cos(az),y:ip.y-TL*Math.sin(az)};
    const outAz=az+(dir==='R'?IA:-IA);
    const ec={name:`EC${id}`,x:ip.x+TL*Math.cos(outAz),y:ip.y+TL*Math.sin(outAz)};
    const roAz=az+(dir==='R'?Math.PI/2:-Math.PI/2);
    const ro={name:`RO${id}`,x:bc.x+R*Math.cos(roAz),y:bc.y+R*Math.sin(roAz)};
    const straight=Math.hypot(bc.x-lineStart.x,bc.y-lineStart.y);
    const startDist=accum+straight,endDist=startDist+CL;
    if(straight>1e-6)sections.push({type:'直線',from:lineStart.name,to:`BC${id}`,start:accum,end:startDist,length:straight});
    sections.push({type:'曲線',from:`BC${id}`,to:`EC${id}`,curveId:id,start:startDist,end:endDist,length:CL});
    const c={id,L,R,IA,iaDeg:radToDeg(IA),dir,TL,CL,ip,bc,ec,ro,inAz:az,outAz,startDist,endDist};
    curves.push(c); pts.push(ip,bc,ec,ro);
    x=ip.x;y=ip.y;az=outAz;accum=endDist;lineStart=ec;lastPoint=ec;lastCurve=c;
  });
  const finalL=+p.alignment?.finalL||0;
  let ep;
  if(lastCurve){ep={name:'EP',x:lastCurve.ip.x+finalL*Math.cos(lastCurve.outAz),y:lastCurve.ip.y+finalL*Math.sin(lastCurve.outAz)}}
  else{ep={name:'EP',x:x+finalL*Math.cos(az),y:y+finalL*Math.sin(az)}}
  const finalLen=Math.hypot(ep.x-lastPoint.x,ep.y-lastPoint.y);
  if(finalLen>1e-6)sections.push({type:'直線',from:lastPoint.name,to:'EP',start:accum,end:accum+finalLen,length:finalLen});
  pts.push(ep);
  return {points:pts,curves,sections,totalDistance:accum+finalLen};
}
function sectionAt(d){
  return G.sections.find(s=>d>=s.start-1e-9&&d<=s.end+1e-9)||G.sections[G.sections.length-1];
}
function calcBaseValues(){
  const pipe=pipeDefaults(P);
  const soil=P.soil||{};
  const gamma=+soil.gamma||13, phi=+soil.phi||5, c=+soil.c||3, H=+soil.cover||5.31;
  const alpha=0.625, attach=+soil.adhesion||10, Nfactor=+soil.noseFactor||1;
  const muPrime=Math.tan(degToRad(phi/2));
  const D=pipe.outer, w=pipe.weight, PL=pipe.length, Bs=D+0.006*2;
  const Bt=D+0.1;
  const Be=(1+Math.sin(degToRad(45-phi/2)))/Math.cos(degToRad(45-phi/2))*Bt;
  const mu=Math.tan(degToRad(phi));
  const K0=1;
  const Ce=(1/(2*K0*mu/Be))*(1-Math.exp(-(2*K0*mu/Be)*H));
  const vertical=Math.max(0,(gamma-2*c/Be)*Ce);
  const liveImpact=H>=6.5?0:(H>=1.5?0.65-0.1*H:0.5);
  const liveP=+soil.liveLoadP||100, liveBeta=+soil.liveLoadBeta||0.9, liveC=+soil.liveLoadC||2.75, liveA=+soil.liveLoadA||0.2, liveTheta=+soil.liveLoadTheta||45;
  const liveDefault=(2*liveP*(1+liveImpact)*liveBeta)/(liveC*(liveA+2*H*Math.tan(degToRad(liveTheta))));
  const live=Number.isFinite(+soil.liveLoad)?+soil.liveLoad:liveDefault;
  const q=vertical+live;
  const sigma=1.25*q;
  const tau=sigma*muPrime+attach;
  const fo=alpha*Math.PI*D*tau+w*muPrime;
  const F0=10*1.32*Math.PI*Bs*Nfactor;
  const allow=pipe.allowForce||0;
  return {pipe,gamma,phi,c,H,alpha,attach,Nfactor,muPrime,D,w,PL,Bs,Bt,Be,Ce,vertical,live,liveImpact,liveP,liveBeta,liveC,liveA,liveTheta,q,sigma,tau,fo,F0,allow};
}
function curveParams(curve, base){
  const alpha1=2*Math.asin((base.PL/2)/(curve.R-base.D/2));
  const curveK=Math.tan(degToRad(base.phi<15?15:base.phi/2));
  const K=1/(Math.cos(alpha1)-curveK*Math.sin(alpha1));
  const n=Math.max(1,Math.ceil(curve.CL/base.PL));
  const lambda=(Math.pow(K,n+1)-K)/(n*(K-1));
  return {alpha1,K,n,lambda,curveK};
}
function forceAtDistance(d, base){
  let F=base.F0;
  const details=[];
  for(const s of G.sections){
    if(d<=s.start)break;
    const used=Math.min(d,s.end)-s.start;
    if(used<=0)continue;
    if(s.type==='直線'){
      const before=F;
      F+=base.fo*used;
      details.push({section:`${s.from}-${s.to}`,type:'直線',len:used,before,after:F,formula:`${fmt(before,3)} + ${fmt(base.fo,3)}×${fmt(used,3)}`});
    }else{
      const c=G.curves.find(x=>x.id===s.curveId), cp=curveParams(c,base);
      const m=Math.max(1,used/base.PL);
      const lambdaPart=(Math.pow(cp.K,m+1)-cp.K)/(m*(cp.K-1));
      const before=F;
      F=before*Math.pow(cp.K,m)+lambdaPart*base.fo*used;
      details.push({section:`第${c.id}曲線`,type:'曲線',len:used,before,after:F,K:cp.K,lambda:lambdaPart,formula:`${fmt(before,3)}×${fmt(cp.K,6)}^${fmt(m,3)} + ${fmt(lambdaPart,3)}×${fmt(base.fo,3)}×${fmt(used,3)}`});
    }
    if(d<=s.end)break;
  }
  return {force:F,details};
}
function calcForce(){
  const base=calcBaseValues();
  const total=G.totalDistance, PL=base.PL;
  PIPE_ROWS=[]; CURVE_ROWS=[];
  const count=Math.ceil(total/PL);
  for(let i=0;i<=count;i++){
    const d=Math.min(i*PL,total);
    const sec=sectionAt(d);
    const res=forceAtDistance(d,base);
    PIPE_ROWS.push({pipeNo:i,d,section:sec?.type||'',range:sec?`${sec.from}-${sec.to}`:'',force:res.force,formula:res.details.at(-1)?.formula||`F0=${fmt(base.F0,3)}`});
  }
  if(PIPE_ROWS[PIPE_ROWS.length-1].d<total-1e-6){
    const sec=sectionAt(total),res=forceAtDistance(total,base);
    PIPE_ROWS.push({pipeNo:PIPE_ROWS.length,d:total,section:sec?.type||'',range:sec?`${sec.from}-${sec.to}`:'EP',force:res.force,formula:res.details.at(-1)?.formula||''});
  }
  for(const c of G.curves){
    const cp=curveParams(c,base);
    const bc=forceAtDistance(c.startDist,base).force;
    const ec=forceAtDistance(c.endDist,base).force;
    CURVE_ROWS.push({id:c.id,dir:c.dir,R:c.R,CL:c.CL,BC:c.startDist,EC:c.endDist,bcForce:bc,ecForce:ec,alpha1:radToDeg(cp.alpha1),curveK:cp.curveK,K:cp.K,n:cp.n,lambda:cp.lambda,formula:`${fmt(bc,3)}×${fmt(cp.K,6)}^${cp.n} + ${fmt(cp.lambda,3)}×${fmt(base.fo,3)}×${fmt(c.CL,3)}`});
  }
  CALC={base,maxForce:Math.max(...PIPE_ROWS.map(r=>r.force)),total};
}
function rankClass(v){return v==='OK'?'ok':v==='注意'?'warn':'ng'}
function run(p){
  P=p||getProject();
  if(!P){document.getElementById('summary').innerHTML='<p class="note">基線JSONを読み込んでください。</p>';return}
  G=calcGeometry(P);
  calcForce();
  renderSummary(); renderBasis(); renderCurves(); renderSchedule(); renderSources(); draw();
}
function renderSummary(){
  const b=CALC.base, ok=(!b.allow||CALC.maxForce<=b.allow), margin=b.allow?b.allow-CALC.maxForce:NaN;
  document.getElementById('summary').innerHTML=[
    metric('推進延長',`${fmt(CALC.total,3)} m`),
    metric('最大予定推力',`${fmt(CALC.maxForce,1)} kN`),
    metric('推進管耐荷力',b.allow?`${fmt(b.allow,0)} kN`:'未設定'),
    metric('判定',b.allow?`<span class="pill ${rankClass(ok?'OK':'NG')}">${ok?'OK':'NG'}</span> ${Number.isFinite(margin)?'余裕 '+fmt(margin,1)+' kN':''}`:'耐荷力未設定')
  ].join('');
}
function metric(label,value){return `<div class="metric"><div class="label">${esc(label)}</div><div class="value">${value}</div></div>`}
function renderBasis(){
  const b=CALC.base;
  const rows=[
    ['現場',`${P.site?.name||''} / ${P.site?.span||''}`,'基線JSON site'],
    ['管外径 D',`${fmt(b.D,3)} m`,'基線JSON pipe.outer'],
    ['管長 PL',`${fmt(b.PL,3)} m`,'基線JSON pipe.length'],
    ['管重量 w',`${fmt(b.w,3)} kN/m`,'基線JSON pipe.weight'],
    ['土被り H',`${fmt(b.H,3)} m`,'基線JSON soil.cover'],
    ['等分布荷重 q',`${fmt(b.q,3)} kN/m2`,`q = 鉛直 ${fmt(b.vertical,3)} + 活荷重 ${fmt(b.live,3)}`],
    ['活荷重',`${fmt(b.live,3)} kN/m2`,`Excel活荷重式: 2P(1+i)β / {C(a+2Htanθ)}, i=${fmt(b.liveImpact,3)}`],
    ['摩擦係数 μ′',fmt(b.muPrime,6),'μ′ = tan(φ/2)'],
    ['せん断抵抗 τa',`${fmt(b.tau,3)} kN/m2`,'τa = σ×μ′ + 付着力, σ=1.25×q'],
    ['外周抵抗値 fo',`${fmt(b.fo,3)} kN/m`,'fo = α×π×D×τa + w×μ′'],
    ['初期抵抗 F0',`${fmt(b.F0,3)} kN`,'F0 = 10×1.32×π×Bs×N'],
  ];
  document.getElementById('basis').innerHTML=`<div class="tablewrap"><table><tr><th>項目</th><th>値</th><th>計算根拠</th></tr>${rows.map(r=>`<tr><td class="left">${esc(r[0])}</td><td class="mono">${esc(r[1])}</td><td class="left small">${esc(r[2])}</td></tr>`).join('')}</table></div>`;
}
function renderCurves(){
  if(!CURVE_ROWS.length){document.getElementById('curveTable').innerHTML='<p class="note">曲線区間はありません。</p>';return}
  document.getElementById('curveTable').innerHTML=`<table><tr><th>曲線</th><th>方向</th><th>R</th><th>CL</th><th>α1</th><th>k</th><th>K</th><th>n</th><th>λ</th><th>BC推力</th><th>EC推力</th><th>式</th></tr>${CURVE_ROWS.map(r=>`<tr><td>第${r.id}曲線</td><td>${r.dir==='L'?'左':'右'}</td><td class="mono">${fmt(r.R,3)}</td><td class="mono">${fmt(r.CL,3)}</td><td class="mono">${fmt(r.alpha1,6)}°</td><td class="mono">${fmt(r.curveK,6)}</td><td class="mono">${fmt(r.K,6)}</td><td class="mono">${r.n}</td><td class="mono">${fmt(r.lambda,3)}</td><td class="mono">${fmt(r.bcForce,1)}</td><td class="mono"><b>${fmt(r.ecForce,1)}</b></td><td class="left small mono">${esc(r.formula)}</td></tr>`).join('')}</table>`;
}
function renderSchedule(){
  document.getElementById('scheduleTable').innerHTML=`<table><tr><th>本数</th><th>推進距離</th><th>区分</th><th>範囲</th><th>予定推力</th><th>計算式</th></tr>${PIPE_ROWS.map(r=>`<tr><td>${r.pipeNo}</td><td class="mono">${fmt(r.d,3)} m</td><td>${esc(r.section)}</td><td>${esc(r.range)}</td><td class="mono"><b>${fmt(r.force,1)} kN</b></td><td class="left small mono">${esc(r.formula)}</td></tr>`).join('')}</table>`;
}
function renderSources(){
  document.getElementById('sources').innerHTML=`<table><tr><th>資料</th><th>箇所</th><th>使用内容</th></tr>${SOURCE_NOTES.map(r=>`<tr><td class="left">${esc(r[0])}</td><td>${esc(r[1])}</td><td class="left">${esc(r[2])}</td></tr>`).join('')}</table><p class="note">PDF/Excelから読み取った根拠を画面に明示しています。係数や式を変更する場合は、ここに表示される根拠行も合わせて確認してください。</p>`;
}
function draw(){
  const c=document.getElementById('graph'),ctx=c.getContext('2d'); c.width=c.clientWidth; c.height=c.clientHeight||440;
  ctx.clearRect(0,0,c.width,c.height);
  const b=CALC.base, maxY=Math.max(b.allow||0,CALC.maxForce)*1.15||100, m={l:70,r:30,t:30,b:58}, gw=c.width-m.l-m.r, gh=c.height-m.t-m.b;
  const sx=d=>m.l+d/CALC.total*gw, sy=f=>m.t+gh-f/maxY*gh;
  ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
  ctx.strokeStyle='#e5e7eb';ctx.fillStyle='#334155';ctx.font='12px Meiryo';ctx.textAlign='right';
  for(let i=0;i<=5;i++){const y=sy(maxY*i/5);ctx.beginPath();ctx.moveTo(m.l,y);ctx.lineTo(c.width-m.r,y);ctx.stroke();ctx.fillText(fmt(maxY*i/5,0),m.l-8,y+4)}
  ctx.textAlign='center';
  for(let i=0;i<=10;i++){const d=CALC.total*i/10,x=sx(d);ctx.beginPath();ctx.moveTo(x,m.t);ctx.lineTo(x,m.t+gh);ctx.stroke();ctx.fillText(fmt(d,1)+'m',x,m.t+gh+18)}
  G.curves.forEach(cur=>{ctx.fillStyle='rgba(251,191,36,.22)';ctx.fillRect(sx(cur.startDist),m.t,Math.max(1,sx(cur.endDist)-sx(cur.startDist)),gh);ctx.fillStyle='#92400e';ctx.fillText(`C${cur.id}`,sx((cur.startDist+cur.endDist)/2),m.t+16)});
  if(b.allow){ctx.strokeStyle='#b91c1c';ctx.setLineDash([6,4]);ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(m.l,sy(b.allow));ctx.lineTo(c.width-m.r,sy(b.allow));ctx.stroke();ctx.setLineDash([])}
  ctx.strokeStyle='#0055a4';ctx.lineWidth=3;ctx.beginPath();PIPE_ROWS.forEach((r,i)=>{if(i===0)ctx.moveTo(sx(r.d),sy(r.force));else ctx.lineTo(sx(r.d),sy(r.force))});ctx.stroke();
  ctx.fillStyle='#0055a4';PIPE_ROWS.forEach(r=>{ctx.beginPath();ctx.arc(sx(r.d),sy(r.force),3,0,Math.PI*2);ctx.fill()});
  ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(m.l,m.t);ctx.lineTo(m.l,m.t+gh);ctx.lineTo(c.width-m.r,m.t+gh);ctx.stroke();
}

  <h2>根拠ソース</h2>${document.getElementById('sources').innerHTML}
  </body></html>`;
  const blob=new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel;charset=utf-8'});
  const a=document.createElement('a');

}
