<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>レベル野帳</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <p>LEVEL SURVEY</p>
          <h1>レベル野帳</h1>
        </div>
        <button id="exportCsv" type="button">CSV</button>
      </header>

      <section class="base-bar" aria-label="基準高入力">
        <label>
          <span>基準点名</span>
          <input id="basePoint" type="text" value="KBM1">
        </label>
        <label>
          <span>基準高 GL</span>
          <input id="baseGl" type="text" inputmode="none" value="10.830" readonly>
        </label>
        <button id="resetBook" type="button">新規</button>
      </section>

      <section class="table-wrap" aria-label="野帳表">
        <table class="level-table">
          <thead>
            <tr>
              <th>BS</th>
              <th>IH</th>
              <th>FS</th>
              <th>GL</th>
              <th>測点名</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>

      <section class="entry-panel" aria-label="入力パネル">
        <div class="entry-readout">
          <span id="activeType">GL</span>
          <input id="activePoint" type="text" placeholder="測点名">
          <strong id="activeValue">10.830</strong>
        </div>

        <div class="keypad">
          <button type="button" data-key="7">7</button>
          <button type="button" data-key="8">8</button>
          <button type="button" data-key="9">9</button>
          <button type="button" data-action="back">⌫</button>
          <button type="button" data-key="4">4</button>
          <button type="button" data-key="5">5</button>
          <button type="button" data-key="6">6</button>
          <button type="button" data-action="clear">C</button>
          <button type="button" data-key="1">1</button>
          <button type="button" data-key="2">2</button>
          <button type="button" data-key="3">3</button>
          <button type="button" data-action="sign">+/-</button>
          <button type="button" data-key="0">0</button>
          <button type="button" data-key=".">.</button>
          <button type="button" data-action="left">←</button>
          <button type="button" data-action="right">→</button>
        </div>

        <div class="mode-row">
          <button id="modeBs" type="button">BS</button>
          <button id="modeFs" type="button">FS</button>
          <button id="speakValue" type="button">読上</button>
          <button id="prevRow" type="button">↑</button>
          <button id="nextRow" type="button">↓</button>
        </div>
      </section>

      <footer class="save-state" id="saveState">保存済み</footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
