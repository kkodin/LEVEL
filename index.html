<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>レベル野帳</title>
    <meta name="theme-color" content="#07866f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="レベル野帳">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <button id="edgeOpen" class="edge-open" type="button" aria-label="メニュー"></button>
      <input id="csvFile" type="file" accept=".csv,text/csv,.xls,.xml,application/vnd.ms-excel,text/xml,application/xml" hidden>

      <!-- Startup dialog -->
      <div id="startupChoice" class="startup-choice" role="dialog" aria-label="開始方法">
        <div class="startup-panel">
          <button id="startupContinue" type="button">前回の続き</button>
          <button id="startupImport" type="button">ファイルを読み込む</button>
          <button id="startupNew" type="button">新規現場</button>
        </div>
      </div>

      <!-- Inline modal (replaces window.prompt / window.confirm) -->
      <div id="inlineModal" class="inline-modal-overlay hidden" role="dialog" aria-modal="true">
        <div class="inline-modal">
          <h3 id="inlineModalTitle"></h3>
          <p id="inlineModalBody" style="display:none"></p>
          <div id="inlineModalFields"></div>
          <div class="inline-modal-actions">
            <button id="inlineModalCancel" class="btn-cancel" type="button">キャンセル</button>
            <button id="inlineModalConfirm" type="button">確定</button>
          </div>
        </div>
      </div>

      <aside id="drawer" class="drawer" aria-label="測点台帳">
        <div class="drawer-head">
          <div>
            <p>POINT LIST</p>
            <h2>測点台帳</h2>
          </div>
          <button id="menuClose" type="button" aria-label="閉じる">×</button>
        </div>
        <div class="drawer-accordion">
          <section id="drawerInfoSection" class="accordion-section open">
            <button id="toggleInfo" class="accordion-toggle" type="button" data-accordion="info" aria-expanded="true">測点情報</button>
            <div class="accordion-body">
              <section class="meta-bar" aria-label="測定情報">
                <h3>測定情報</h3>
                <div class="meta-fields">
                  <label>
                    <span>作成日</span>
                    <input id="surveyDate" type="date">
                  </label>
                  <label>
                    <span>現場名（ファイル名）</span>
                    <input id="siteName" type="text">
                  </label>
                  <label>
                    <span>作業名</span>
                    <input id="surveyPlace" type="text">
                  </label>
                </div>
              </section>
              <div class="drawer-actions">
                <button id="exportExcel" type="button">保存</button>
                <button id="importCsv" type="button">読込</button>
              </div>
              <div class="point-entry">
                <div class="point-entry-fields">
                  <label>
                    <span>測点名</span>
                    <input id="savedPointName" type="text" placeholder="KBM1" list="pointSuggestions">
                    <datalist id="pointSuggestions"></datalist>
                  </label>
                  <label>
                    <span>数値</span>
                    <input id="savedPointValue" type="text" inputmode="decimal" placeholder="10.830">
                  </label>
                </div>
                <button id="savePoint" type="button" disabled>基準点<br>追加</button>
              </div>
            </div>
          </section>
          <section id="drawerPointsSection" class="accordion-section">
            <button id="togglePoints" class="accordion-toggle" type="button" data-accordion="points" aria-expanded="false">登録済測点</button>
            <div class="accordion-body">
              <div id="pointList" class="point-list"></div>
            </div>
          </section>
        </div>
      </aside>
      <div id="drawerBackdrop" class="drawer-backdrop"></div>

      <section id="surveySummary" class="survey-summary"></section>

      <section class="table-switch" aria-label="計算表切替">
        <label>
          <span>計算表</span>
          <select id="tableSelect"></select>
        </label>
        <button id="addTable" type="button">表追加</button>
      </section>

      <section class="base-bar" aria-label="基準高入力" hidden>
        <label>
          <span>基準点名</span>
          <input id="basePoint" type="text" value="KBM1">
        </label>
        <label>
          <span>基準高 GL</span>
          <input id="baseGl" type="text" inputmode="none" value="10.830" readonly>
        </label>
      </section>

      <section class="table-wrap" aria-label="野帳表">
        <table class="level-table">
          <thead>
            <tr>
              <th>BS</th>
              <th>IH</th>
              <th>FS</th>
              <th>GL</th>
              <th>測点名</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>

      <section class="entry-panel" aria-label="入力パネル">
        <div class="entry-top">
          <div class="entry-readout">
            <span id="activeType">GL</span>
            <input id="activePoint" type="text" placeholder="測点名">
            <strong id="activeValue">10.830</strong>
          </div>
          <button id="allClearButton" class="all-clear-button" type="button" data-action="all-clear">AC</button>
        </div>

        <!-- Mode row: BS / FS / up / down / confirm -->
        <div class="mode-row">
          <button id="modeBs" type="button">BS</button>
          <button id="modeFs" type="button">FS</button>
          <button id="prevRow" class="btn-nav" type="button">↑</button>
          <button id="nextRow" class="btn-nav" type="button">↓</button>
          <button id="confirmEntry" class="btn-confirm" type="button">確定 →</button>
        </div>

        <div class="keypad">
          <button type="button" data-key="7">7</button>
          <button type="button" data-key="8">8</button>
          <button type="button" data-key="9">9</button>
          <button type="button" data-action="clear">C</button>
          <button type="button" data-key="4">4</button>
          <button type="button" data-key="5">5</button>
          <button type="button" data-key="6">6</button>
          <button type="button" data-action="back">⌫</button>
          <button type="button" data-key="1">1</button>
          <button type="button" data-key="2">2</button>
          <button type="button" data-key="3">3</button>
          <button type="button" data-action="sign">+/-</button>
          <button type="button" data-key="0">0</button>
          <button type="button" data-key=".">.</button>
          <button type="button" data-action="left">←</button>
          <button type="button" data-action="right">→</button>
        </div>
      </section>

      <footer class="save-state" id="saveState">保存済み</footer>

      <!-- Point picker bottom sheet (appears when tapping point name cell after FS) -->
      <div id="pointPicker" class="point-picker hidden" role="dialog" aria-label="測点名選択">
        <div class="point-picker-sheet">
          <div class="point-picker-head">
            <span>測点名を選択または入力</span>
            <button id="pointPickerClose" type="button" aria-label="閉じる">×</button>
          </div>
          <div class="point-picker-search">
            <input id="pointPickerInput" type="text" placeholder="測点名を入力">
          </div>
          <div id="pointPickerList" class="point-picker-list"></div>
          <div class="point-picker-actions">
            <button id="pointPickerCancel" class="btn-cancel" type="button">キャンセル</button>
            <button id="pointPickerConfirm" type="button">確定</button>
          </div>
        </div>
      </div>

      <!-- Error comparison modal -->
      <div id="errorModal" class="error-modal hidden" role="dialog" aria-label="既知点との誤差">
        <div class="error-modal-sheet">
          <div class="error-modal-head">
            <h3>既知点との誤差</h3>
            <button id="errorModalClose" type="button" aria-label="閉じる">×</button>
          </div>
          <div id="errorModalBody" class="error-modal-body"></div>
          <div class="error-modal-actions">
            <button id="errorModalCsv" type="button" class="btn-secondary">CSV保存</button>
            <button id="errorModalExcel" type="button" class="btn-secondary">Excel保存</button>
          </div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
