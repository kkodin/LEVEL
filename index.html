<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>曲線推進管理システム</title>
<style>
:root{--blue:#0055a4;--bg:#f4f6f8;--line:#d8dee6;--text:#1f2937}
*{box-sizing:border-box}
body{font-family:Meiryo,"Yu Gothic",sans-serif;margin:0;background:var(--bg);color:var(--text)}
header{background:#003366;color:#fff;padding:14px 18px}
h1{font-size:20px;margin:0}
main{max-width:880px;margin:24px auto;padding:0 14px}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px;margin:14px 0;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
button,a.button{display:block;text-align:center;text-decoration:none;border:0;border-radius:8px;padding:13px 12px;font-weight:bold;cursor:pointer;background:#2563eb;color:#fff}
a.secondary{background:#64748b}
.note{font-size:13px;color:#64748b;line-height:1.7}
.detected{font-weight:bold;color:#0055a4}
@media(max-width:760px){main{margin:12px auto}.choices{grid-template-columns:1fr}.card{box-shadow:none}}
</style>
</head>
<body>
<header><h1>曲線推進管理システム</h1></header>
<main>
  <div class="card">
    <h2>端末に合わせて開きます</h2>
    <p class="note">判定結果: <span id="detected" class="detected">確認中</span></p>
    <p class="note">下のボタンを押すと別タブで開きます。元のメニュー画面は残ります。</p>
    <div class="choices">
      <a class="button" href="./mobile/00_basic_input.html">スマホ用を開く</a>
      <a class="button secondary" href="./tablet/00_basic_input.html">タブレット用を開く</a>
      <a class="button secondary" href="./pc/00_basic_input.html">PC用を開く</a>
    </div>
  </div>
</main>
<script>
function detectDevice(){
  const ua=navigator.userAgent||'';
  const platform=navigator.platform||'';
  const touch=navigator.maxTouchPoints||0;
  const minSide=Math.min(screen.width||innerWidth,screen.height||innerHeight);
  const isIPad=/iPad/.test(ua) || (platform==='MacIntel' && touch>1);
  const isTablet=isIPad || /Tablet|Kindle|Silk|PlayBook/.test(ua) || (/Android/.test(ua) && !/Mobile/.test(ua)) || (touch>0 && minSide>=700);
  const isPhone=/iPhone|iPod|Android.*Mobile|Windows Phone/.test(ua) || (touch>0 && minSide<700);
  if(isTablet)return {label:'タブレット',url:'./tablet/00_basic_input.html'};
  if(isPhone)return {label:'スマホ',url:'./mobile/00_basic_input.html'};
  return {label:'PC',url:'./pc/00_basic_input.html'};
}
const device=detectDevice();
document.getElementById('detected').textContent=device.label+'用を開きます';
setTimeout(()=>{ window.location.href=device.url; }, 500);
</script>
</body>
</html>
