<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>01 線形計算・座標一覧</title><style>
:root{--blue:#0055a4;--bg:#f4f6f8;--line:#d8dee6;--text:#1f2937;--ok:#177245;--warn:#b45309;--ng:#b91c1c;}
*{box-sizing:border-box} body{font-family:Meiryo,"Yu Gothic",sans-serif;margin:0;background:var(--bg);color:var(--text);font-size:14px} header{background:#003366;color:#fff;padding:12px 18px;font-weight:bold;display:flex;justify-content:space-between;align-items:center} main{max-width:1120px;margin:18px auto;padding:0 14px}.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin:14px 0;box-shadow:0 2px 8px rgba(0,0,0,.05)}h1{font-size:20px;margin:0}h2{font-size:17px;border-left:6px solid var(--blue);padding-left:10px;margin:4px 0 14px}.grid{display:grid;grid-template-columns:repeat(2,minmax(260px,1fr));gap:12px 24px}.row{display:flex;align-items:center;gap:8px;margin:8px 0}.row label{min-width:180px;text-align:right;font-weight:bold;color:#374151}input,select,button,textarea{font-family:inherit;font-size:14px}input,select,textarea{border:1px solid #b8c0cc;border-radius:6px;padding:7px 9px;background:#fff}input.num{text-align:right;ime-mode:disabled;width:120px;font-family:Consolas,monospace}input:focus,select:focus,textarea:focus{outline:2px solid #93c5fd;border-color:#2563eb}button{border:0;border-radius:7px;padding:9px 14px;font-weight:bold;cursor:pointer;background:#2563eb;color:#fff}button.secondary{background:#64748b}button.ok{background:#17803d}button.warn{background:#d97706}button.danger{background:#b91c1c}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.note{font-size:12px;color:#64748b;line-height:1.6}.pill{display:inline-block;border-radius:999px;padding:4px 9px;font-weight:bold}.pill.ok{background:#dcfce7;color:#166534}.pill.warn{background:#fef3c7;color:#92400e}.pill.ng{background:#fee2e2;color:#991b1b}table{border-collapse:collapse;width:100%;background:#fff;margin-top:10px}th,td{border:1px solid #cfd7e3;padding:7px;text-align:center}th{background:#334155;color:#fff}.mono{font-family:Consolas,monospace}.small{font-size:12px}.hide{display:none}.full{width:100%}@media(max-width:760px){.grid{grid-template-columns:1fr}.row{align-items:flex-start;flex-direction:column}.row label{text-align:left;min-width:0}}
</style></head><body><header><h1>01 線形計算・座標一覧</h1><div class="toolbar"><input type="file" id="file" accept=".json" onchange="loadProjectFile(this,run)"><button onclick="run(getProject())">再計算</button><button class="ok" onclick="saveWithGeometry()">計算結果付きJSON保存</button></div></header><main><div class="card"><h2>読み込み情報</h2><div id="info" class="note"></div></div><div class="card"><h2>座標一覧</h2><div id="table"></div></div><div class="card"><h2>区間距離一覧（BP-BC-EC-EP）</h2><div id="sectionsTable"></div></div><div class="card"><h2>曲線要素（通し番号付き）</h2><div id="curvesTable"></div></div></main><script>
const PIPE_SIZES=[250,300,350,400,450,500,600,700,800,900,1000,1100,1200,1350,1500,1650,1800,2000,2200,2400,2600,2800,3000];
const HUME_T={250:55,300:57,350:60,400:63,450:67,500:70,600:76,700:82,800:80,900:90,1000:100,1100:105,1200:115,1350:125,1500:140,1650:150,1800:160,2000:175,2200:190,2400:205,2600:220,2800:235,3000:250};
function n(id,def=0){const el=document.getElementById(id); const v=el?parseFloat(String(el.value).replace(',','')):NaN; return Number.isFinite(v)?v:def;}
function v(id,def=''){const el=document.getElementById(id);return el?el.value:def}
function set(id,val){const el=document.getElementById(id); if(el) el.value=val}
function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function dmsToDeg(d,m,s){return (+d||0)+(+m||0)/60+(+s||0)/3600}
function pipeDefault(size,cat='ヒューム管'){
  const inner=size/1000; let t=(HUME_T[size]||125)/1000; let unitW=24.5;
  if(cat==='レジン管'){t=Math.max(0.02, inner*0.045); unitW=19.5}
  if(cat==='鋼管'){t=size>=2000?0.019:(size>=1500?0.016:(size>=1000?0.0127:0.0095)); unitW=78.5}
  const outer=inner+2*t; const area=Math.PI/4*(outer*outer-inner*inner); const weight=area*unitW; const len=size<350?2.0:2.43;
  return {inner,outer,t,area,weight,len,centerR:(inner+t)/2};
}
function collectBase(){
  const curves=[]; document.querySelectorAll('.curve').forEach((el,i)=>curves.push({L:+el.querySelector('.cL').value||0,R:+el.querySelector('.cR').value||0,dir:el.querySelector('.cDir').value,deg:+el.querySelector('.cDeg').value||0,min:+el.querySelector('.cMin').value||0,sec:+el.querySelector('.cSec').value||0}));
  return {version:'split-2026-05-18',savedAt:new Date().toISOString(),site:{name:v('siteName'),span:v('spanName'),date:v('inputDate')},soil:{type:v('soilType'),gamma:n('soilWeight'),phi:n('soilPhi'),c:n('soilC'),N:n('soilN'),cover:n('soilH')},pipe:{category:v('pipeCategory'),strength:v('pipeStrength'),joint:v('jointType'),size:n('pipeSize'),inner:n('pipeInner'),outer:n('pipeOuter'),thickness:n('pipeT'),area:n('pipeArea'),weight:n('pipeWeight'),length:n('pipeLength'),cushion:n('cushionT'),cushionCrush:n('cushionCrush'),allowOpen:n('allowOpen'),allowForce:n('allowForce')},survey:{ox:n('instX'),oy:n('instY'),bx:n('bsX'),by:n('bsY')},alignment:{baseAz:n('baseAz'),curves,finalL:n('finalL')}};
}
function downloadJSON(obj,fn){const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn||'project.json';a.click();URL.revokeObjectURL(a.href)}
function safeName(s){return (s||'現場').replace(/[\\/:*?"<>|\s]+/g,'_')}
function loadProjectFile(input,cb){const f=input.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{const obj=JSON.parse(r.result); localStorage.setItem('curvedJackingProject',JSON.stringify(obj)); cb&&cb(obj)}catch(e){alert('JSON読込に失敗しました: '+e.message)}}; r.readAsText(f,'utf-8')}
function getProject(){try{return JSON.parse(localStorage.getItem('curvedJackingProject')||'null')}catch(e){return null}}
function applyBase(p){if(!p)return; set('siteName',p.site?.name||'');set('spanName',p.site?.span||'');set('inputDate',p.site?.date||today());set('soilType',p.soil?.type||'粘性土');set('soilWeight',fmt(p.soil?.gamma??13,3));set('soilPhi',fmt(p.soil?.phi??5,3));set('soilC',fmt(p.soil?.c??3,3));set('soilN',fmt(p.soil?.N??4,1));set('soilH',fmt(p.soil?.cover??5.31,3));set('pipeCategory',p.pipe?.category||'ヒューム管');set('pipeStrength',p.pipe?.strength||'1種');set('jointType',p.pipe?.joint||'JC');set('pipeSize',p.pipe?.size||1350);set('pipeInner',fmt(p.pipe?.inner??1.35,3));set('pipeOuter',fmt(p.pipe?.outer??1.60,3));set('pipeT',fmt(p.pipe?.thickness??0.125,3));set('pipeArea',fmt(p.pipe?.area??0.579,4));set('pipeWeight',fmt(p.pipe?.weight??14.19,3));set('pipeLength',fmt(p.pipe?.length??2.43,4));set('cushionT',fmt(p.pipe?.cushion??10,1));set('cushionCrush',fmt(p.pipe?.cushionCrush??2,1));set('allowOpen',fmt(p.pipe?.allowOpen??60,1));set('allowForce',fmt(p.pipe?.allowForce??7527,0));set('instX',fmt(p.survey?.ox??0,3));set('instY',fmt(p.survey?.oy??0,3));set('bsX',fmt(p.survey?.bx??10,3));set('bsY',fmt(p.survey?.by??0,3));set('baseAz',fmt(p.alignment?.baseAz??0,3));set('finalL',fmt(p.alignment?.finalL??2.15,3));}
function fmt(x,d=3){return (Number.isFinite(+x)?+x:0).toFixed(d)}
function calcGeometry(p){
  const pts=[],curves=[],sections=[]; let x=0,y=0,az=(p.alignment?.baseAz||0)*Math.PI/180, accum=0; const bp={name:'BP',x,y,label:'発進点'}; pts.push(bp);
  let prevBasePoint={x,y,name:'BP'};
  (p.alignment?.curves||[]).forEach((cd,i)=>{const no=i+1,L=+cd.L||0,R=+cd.R||0,IA=dmsToDeg(cd.deg,cd.min,cd.sec)*Math.PI/180,dir=cd.dir||'L'; const TL=R*Math.tan(IA/2),CL=R*IA,SL=R*(1/Math.cos(IA/2)-1); const ip={x:x+L*Math.cos(az),y:y+L*Math.sin(az)}; const bc={x:ip.x-TL*Math.cos(az),y:ip.y-TL*Math.sin(az)}; const outAz=az+(dir==='R'?IA:-IA); const ec={x:ip.x+TL*Math.cos(outAz),y:ip.y+TL*Math.sin(outAz)}; const roAz=az+(dir==='R'?Math.PI/2:-Math.PI/2); const ro={x:bc.x+R*Math.cos(roAz),y:bc.y+R*Math.sin(roAz)}; const straight=Math.hypot(bc.x-x,bc.y-y); const straightStart=accum, startDist=accum+straight,endDist=startDist+CL;
    sections.push({no:sections.length+1,type:'直線',from:prevBasePoint.name,to:`BC${no}`,length:straight,accStart:straightStart,accEnd:startDist,note:no===1?'BPから第1曲線BCまで':`EC${no-1}からBC${no}まで`});
    sections.push({no:sections.length+1,type:`第${no}曲線`,from:`BC${no}`,to:`EC${no}`,length:CL,accStart:startDist,accEnd:endDist,note:`R=${fmt(R,3)}m / ${dir==='L'?'左':'右'}曲線`});
    accum=endDist; const c={id:no,no:`第${no}曲線`,L,R,IA,ia_deg:IA*180/Math.PI,dir,TL,CL,SL,ip,bc,ec,ro,inAz:az,outAz,startDist,endDist}; curves.push(c); pts.push({name:`IP${no}`,...ip,label:`第${no}曲線 交点`},{name:`BC${no}`,...bc,label:`第${no}曲線 曲始`},{name:`EC${no}`,...ec,label:`第${no}曲線 曲終`},{name:`RO${no}`,...ro,label:`第${no}曲線 中心`}); x=ip.x;y=ip.y;az=outAz; prevBasePoint={...ec,name:`EC${no}`};});
  const finalL=+p.alignment?.finalL||0; let ep,finalStraight=0; if(curves.length){const last=curves[curves.length-1]; ep={x:last.ip.x+finalL*Math.cos(last.outAz),y:last.ip.y+finalL*Math.sin(last.outAz)}; finalStraight=Math.hypot(ep.x-last.ec.x,ep.y-last.ec.y); sections.push({no:sections.length+1,type:'最終直線',from:`EC${curves.length}`,to:'EP',length:finalStraight,accStart:accum,accEnd:accum+finalStraight,note:'最終曲線ECから到達点EPまで'}); accum += finalStraight}else{ep={x:x+finalL*Math.cos(az),y:y+finalL*Math.sin(az)};finalStraight=finalL; sections.push({no:1,type:'直線',from:'BP',to:'EP',length:finalStraight,accStart:0,accEnd:finalStraight,note:'直線推進'});accum+=finalStraight}
  pts.push({name:'EP',...ep,label:'到達点'}); const bpEpDistance=Math.hypot(ep.x-bp.x,ep.y-bp.y); return {points:pts,curves,sections,totalDistance:accum,bpEpDistance};
}
function calcJoint(p,c){const L=p.pipe.length, D=p.pipe.inner, t=p.pipe.thickness, R=c.R, S4=p.pipe.cushion||0; const den=Math.max(0.0001,R-D/2); const S1=(L*D/den)*1000+S4; const S2=(L*Math.max(0,D-t)/den)*1000+S4; const S3=(L*t/den)*1000+S4; const simple=(D*2*Math.sin((L/R)/2))*1000+S4; return {S1,S2,S3,S4,simple,margin:(p.pipe.allowOpen||60)-S1,ok:S1<=(p.pipe.allowOpen||60)};}

let project=null, geom=null;function run(p){project=p||getProject(); if(!project){alert('先に00基本情報HTMLで保存、またはJSONを読込してください');return} geom=calcGeometry(project); localStorage.setItem('curvedJackingGeometry',JSON.stringify(geom)); document.getElementById('info').innerHTML=`現場: <b>${project.site.name}</b> / スパン: <b>${project.site.span}</b> / 総推進長: <b>${fmt(geom.totalDistance,3)}m</b>`; render();}
function render(){let h='<table><tr><th>点名</th><th>内容</th><th>X</th><th>Y</th></tr>'; geom.points.forEach(p=>h+=`<tr><td><b>${p.name}</b></td><td>${p.label}</td><td class="mono">${fmt(p.x,3)}</td><td class="mono">${fmt(p.y,3)}</td></tr>`); h+='</table>';document.getElementById('table').innerHTML=h;
 let s='<table><tr><th>No</th><th>区間種別</th><th>開始点</th><th>終了点</th><th>区間距離</th><th>累加距離 始</th><th>累加距離 終</th><th>備考</th></tr>'; (geom.sections||[]).forEach(x=>s+=`<tr><td>${x.no}</td><td>${x.type}</td><td><b>${x.from}</b></td><td><b>${x.to}</b></td><td class="mono">${fmt(x.length,3)} m</td><td class="mono">${fmt(x.accStart,3)} m</td><td class="mono">${fmt(x.accEnd,3)} m</td><td>${x.note||''}</td></tr>`); s+=`<tr><th colspan="4">線形上の総推進距離 BP→EP</th><th class="mono">${fmt(geom.totalDistance,3)} m</th><th colspan="2">BP-EP間の直線距離</th><th class="mono">${fmt(geom.bpEpDistance,3)} m</th></tr>`; s+='</table>'; document.getElementById('sectionsTable').innerHTML=s;
 let c='<table><tr><th>通し番号</th><th>方向</th><th>R</th><th>IA(10進)</th><th>TL</th><th>CL</th><th>SL</th><th>BC累加距離</th><th>EC累加距離</th></tr>'; geom.curves.forEach(x=>c+=`<tr><td><b>第${x.id}曲線</b></td><td>${x.dir==='L'?'左':'右'}</td><td>${fmt(x.R,3)}</td><td>${x.ia_deg.toFixed(7)}</td><td>${fmt(x.TL,3)}</td><td>${fmt(x.CL,3)}</td><td>${fmt(x.SL,3)}</td><td>${fmt(x.startDist,3)}</td><td>${fmt(x.endDist,3)}</td></tr>`); c+='</table>';document.getElementById('curvesTable').innerHTML=c;}
function saveWithGeometry(){if(!project||!geom)run(getProject()); const obj={...project,geometry:geom}; downloadJSON(obj,`${safeName(project.site.name)}_${safeName(project.site.span)}_geometry.json`)}
run(getProject());</script>
<script>
function openPage(file){
  window.location.href='./'+file;
}
</script>

</body></html>
